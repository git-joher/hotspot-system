{% extends "base.html" %}
{% block title %}{{ t('app_name') }}{% endblock %}

{% block content %}
<main class="detail" id="detail-page">
    <a href="/" class="back-link">← {{ t('back') }}</a>
    <div class="detail-header" id="detail-header">
        <span class="spinner">{{ t('loading') }}</span>
    </div>
    <div class="detail-summary" id="detail-summary"></div>
    <div class="detail-impact" id="detail-impact"></div>
    <div class="detail-grid">
        <div class="chart-box"><h3>{{ t('detail_heat_timeline') }}</h3><div class="chart" id="chart-timeline"></div></div>
        <div class="sources-box" id="sources-box"><h3>{{ t('detail_sources') }}</h3><div id="sources-list"></div></div>
    </div>
    <div class="related-box" id="related-box"><h3>{{ t('detail_related') }}</h3><div id="related-list"></div></div>
</main>
{% endblock %}
{% block scripts %}
<script>
(function() {
    const eventId = {{ event_id }};
    if (eventId) { initDetailPage(eventId); }
})();
</script>
{% endblock %}
